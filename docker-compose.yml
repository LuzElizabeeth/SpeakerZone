services:
  db:
    image: postgres:17-alpine
    container_name: speakerzone_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: speakerzone_dev_password
      POSTGRES_DB: speakerzone_tecnm
    ports:
      - "5433:5432"
    volumes:
      - speakerzone_pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed_programa.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d speakerzone_tecnm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: speakerzone_backend
    restart: unless-stopped
    environment:
      PORT: 5001
      JWT_SECRET: clave_docker_demo
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: speakerzone_tecnm
      DB_PASS: speakerzone_dev_password
      DB_PORT: 5432
      DB_SSL: "false"
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: speakerzone_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  speakerzone_pgdata: